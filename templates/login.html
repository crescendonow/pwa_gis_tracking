<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — PWA GIS Online Tracking</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Responsive style -->
    <link rel="stylesheet" href="/pwa_gis_tracking/static/css/responsive.css">
    <style>
        :root {
            --bg-primary:    #FAFBFC;
            --bg-secondary:  #F6F6F6;
            --bg-card:       #FFFFFF;
            --border:        rgba(0,0,0,0.12);
            --text-primary:  #1A1A1A;
            --text-secondary:#4A4A4A;
            --text-muted:    #757575;
            --pwa-blue:      #3F74CA;
            --pwa-blue-light:#78AFE2;
            --pwa-gold:      #3EBA96;
            --accent-green:  #3EBA96;
            --accent-red:    #F05B50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Thai', 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Background Layers ===== */
        .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-auth {
            background: url('/pwa_gis_tracking/static/images/Background-auth.png') center center / cover no-repeat;
            opacity: 0.35;
        }
        .bg-gradient-img {
            background: url('/pwa_gis_tracking/static/images/Background-gradient.png') center bottom / cover no-repeat;
        }
        .bg-bottom {
            background: url('/pwa_gis_tracking/static/images/Background-bottom.png') center bottom / 100% auto no-repeat;
            bottom: 0; top: auto; height: 260px;
        }

        /* ===== Layout ===== */
        .login-wrapper {
            position: relative; z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-container {
            width: 100%; max-width: 420px;
            animation: fadeSlideUp 0.6s ease-out;
        }
        @keyframes fadeSlideUp {
            0%   { opacity:0; transform:translateY(24px); }
            100% { opacity:1; transform:translateY(0); }
        }

        /* ===== Logo ===== */
        .login-header { text-align: center; margin-bottom: 32px; }
        .logo-badge {
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--pwa-blue), var(--pwa-blue-light));
            border-radius: 22px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(63,116,202,0.2), 0 0 0 1px rgba(63,116,202,0.08);
            position: relative; overflow: hidden;
        }
        .logo-badge img {
            width: 80px; height: 80px;
            object-fit: contain;
            border-radius: 8px;
        }
        .logo-badge::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100% { transform:translateX(-100%); } 50% { transform:translateX(100%); } }

        .login-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .login-header p   { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        /* ===== Card ===== */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04) inset;
            position: relative; overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(270deg, #3EBA96 -14%, #3E9DAC 22%, #3F8FB6 42%, #3F74CA 67%);
        }
        .card-title {
            font-size: 16px; font-weight: 600;
            margin-bottom: 24px;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title i { color: var(--pwa-gold); font-size: 14px; }

        /* ===== Form ===== */
        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text-primary); margin-bottom: 6px;
        }
        .input-wrap { position: relative; }
        .input-wrap .icon-left {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted); font-size: 14px;
            transition: color 0.2s; pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px; font-family: inherit;
            outline: none; transition: all 0.2s;
        }
        .input-wrap input::placeholder { color: var(--text-muted); }
        .input-wrap input:focus {
            border-color: var(--pwa-blue-light);
            box-shadow: 0 0 0 3px rgba(63,116,202,0.1);
        }
        .input-wrap input:focus ~ .icon-left { color: var(--pwa-blue-light); }

        .toggle-pass {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 14px; padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: var(--text-secondary); }

        /* ===== Error ===== */
        .error-msg {
            display: none;
            align-items: center; gap: 8px;
            padding: 10px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            font-size: 13px; color: #F05B50;
            margin-bottom: 20px;
            animation: shakeX 0.4s ease-out;
        }
        .error-msg.show { display: flex; }
        @keyframes shakeX {
            0%,100% { transform:translateX(0); }
            20% { transform:translateX(-8px); }
            40% { transform:translateX(6px); }
            60% { transform:translateX(-4px); }
            80% { transform:translateX(2px); }
        }

        /* ===== Button ===== */
        .btn-login {
            width: 100%; padding: 13px 20px;
            background: linear-gradient(135deg, var(--pwa-blue), var(--pwa-blue-light));
            border: none; border-radius: 10px;
            color: #fff; font-size: 15px; font-weight: 600;
            font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s;
            position: relative; overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(63,116,202,0.3);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.7; cursor: wait; }
        .btn-login .spinner-sm {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner-sm { display: block; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ===== Footer ===== */
        .login-footer { text-align: center; margin-top: 24px; }
        .login-footer p { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
        .login-footer .pwa-name { color: var(--pwa-gold); font-weight: 500; }

        .page-footer {
            position: relative; z-index: 1;
            text-align: center; padding: 16px 24px;
        }
        .page-footer p { font-size: 11px; color: var(--text-muted); }

        @media (max-width: 480px) {
            .login-card { padding: 24px 20px; }
            .logo-badge { width: 60px; height: 60px; font-size: 24px; }
            .login-header h1 { font-size: 19px; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-layer bg-gradient-img"></div>
    <div class="bg-layer bg-auth"></div>
    <div class="bg-layer bg-bottom"></div>

    <!-- Login -->
    <div class="login-wrapper">
        <div class="login-container">

            <div class="login-header">
                <div class="logo-badge"><img src="{{.BasePath}}/static/images/pwa-logo.jpg" alt="PWA"></div>
                <h1>PWA GIS Online Tracking</h1>
                <p>พัฒนาต่อยอดจาก gisdata_status และ pwa_checker</p>
            </div>

            <div class="login-card">
                <div class="card-title">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    เข้าสู่ระบบ
                </div>

                <div class="error-msg" id="errorMsg">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="errorText">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
                </div>

                <form id="loginForm" autocomplete="off">
                    <div class="field">
                        <label for="username">ชื่อผู้ใช้</label>
                        <div class="input-wrap">
                            <input type="text" id="username" name="username"
                                   placeholder="กรอกชื่อผู้ใช้" required autofocus>
                            <i class="fa-solid fa-user icon-left"></i>
                        </div>
                    </div>
                    <div class="field">
                        <label for="password">รหัสผ่าน</label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password"
                                   placeholder="กรอกรหัสผ่าน" required>
                            <i class="fa-solid fa-lock icon-left"></i>
                            <button type="button" class="toggle-pass" onclick="togglePassword()">
                                <i class="fa-solid fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-login" id="btnLogin">
                        <span class="btn-text">
                            <i class="fa-solid fa-arrow-right-to-bracket"></i>
                            เข้าสู่ระบบ
                        </span>
                        <div class="spinner-sm"></div>
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <p>
                    <i class="fa-solid fa-shield-halved" style="color:var(--accent-green);margin-right:4px;"></i>
                    ระบบนี้สำหรับนักวิชาการภูมิสารสนเทศ <span class="pwa-name">การประปาส่วนภูมิภาค</span> เท่านั้น
                </p>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <p>PWA GIS Online Tracking © 2026 — Provincial Waterworks Authority</p>
    </footer>

    <script>
        var BASE = '{{.BasePath}}';

        function togglePassword() {
            var inp = document.getElementById('password');
            var ico = document.getElementById('eyeIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                ico.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                inp.type = 'password';
                ico.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('btnLogin');
            var errBox = document.getElementById('errorMsg');
            var errText = document.getElementById('errorText');

            errBox.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                var resp = await fetch(BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                var data = await resp.json();

                if (resp.ok && data.status === 'success') {
                    window.location.href = data.redirect || (BASE + '/');
                } else {
                    errText.textContent = data.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                    errBox.classList.add('show');
                }
            } catch (err) {
                errText.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
                errBox.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Show error on redirect back
        (function() {
            if (new URLSearchParams(window.location.search).get('error') === '1') {
                document.getElementById('errorMsg').classList.add('show');
            }
        })();
    </script>
</body>
</html>
